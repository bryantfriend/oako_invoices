<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Kyrgyz Organics Admin</title>

    <!-- Fonts: Inter (Google Fonts) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="./css/variables.css">
    <link rel="stylesheet" href="./css/animations.css">
    <link rel="stylesheet" href="./css/styles.css">

    <!-- Web App Manifest -->
    <link rel="manifest" href="./manifest.json">

    <!-- Favicon placeholder -->
    <link rel="icon" href="data:,">

    <script>
        window.onerror = function (msg, url, line, col, error) {
            const errDiv = document.createElement('div');
            errDiv.style = "position: fixed; top: 0; left: 0; right: 0; background: red; color: white; z-index: 999999; padding: 20px; font-family: monospace; font-size: 16px; white-space: pre-wrap;";
            errDiv.innerHTML = `<strong>JS ERROR:</strong> ${msg}<br>Location: ${url}:${line}:${col}<br>Stack: ${error ? error.stack : 'N/A'}`;
            document.body.appendChild(errDiv);
            return false;
        };
        window.addEventListener('unhandledrejection', function (event) {
            const errDiv = document.createElement('div');
            errDiv.style = "position: fixed; top: 0; left: 0; right: 0; background: darkred; color: white; z-index: 999999; padding: 20px; font-family: monospace; font-size: 16px; white-space: pre-wrap;";
            errDiv.innerHTML = `<strong>PROMISE REJECTION:</strong> ${event.reason}<br>Stack: ${event.reason.stack}`;
            document.body.appendChild(errDiv);
        });
    </script>
</head>

<body>
    <div id="app">
        <!-- Layout Scaffolding -->
        <aside id="sidebar" class="sidebar hidden">
            <!-- Sidebar content injected by layoutView -->
        </aside>

        <main id="main-content" class="main-content">
            <header id="top-bar" class="top-bar hidden">
                <!-- Header content injected by layoutView -->
            </header>

            <div id="page-container" class="page-container">
                <!-- Page views injected here -->
                <div class="loading-screen">
                    <div class="skeleton-card"></div>
                    <div class="skeleton-text"></div>
                </div>
            </div>
        </main>

        <div id="modal-container"></div>
        <div id="toast-container"></div>
    </div>

    <!-- External Dependencies: Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Application Logic -->
    <script type="module" src="./js/main.js?v=1.96"></script>
</body>

</html>
