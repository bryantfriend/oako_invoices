<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Kyrgyz Organics Admin</title>

    <!-- Fonts: Inter (Google Fonts) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="./css/variables.css">
    <link rel="stylesheet" href="./css/animations.css">
    <link rel="stylesheet" href="./css/styles.css">

    <!-- Web App Manifest -->
    <link rel="manifest" href="./manifest.json">

    <!-- Favicon placeholder -->
    <link rel="icon" href="data:,">

    <script>
        function showDismissibleErrorBanner(title, details, backgroundColor) {
            var errDiv = document.createElement('div');
            var content = document.createElement('div');
            var heading = document.createElement('strong');
            var body = document.createElement('div');
            var closeButton = document.createElement('button');

            errDiv.style.cssText = [
                'position: fixed',
                'top: 0',
                'left: 0',
                'right: 0',
                'z-index: 999999',
                'display: grid',
                'grid-template-columns: minmax(0, 1fr) auto',
                'gap: 14px',
                'align-items: start',
                'max-height: 45vh',
                'overflow: auto',
                'background: ' + backgroundColor,
                'color: white',
                'padding: 16px 18px',
                'font-family: monospace',
                'font-size: 14px',
                'white-space: pre-wrap',
                'box-shadow: 0 12px 30px rgba(0,0,0,0.25)'
            ].join(';');

            heading.textContent = title;
            body.textContent = details;
            body.style.marginTop = '6px';

            closeButton.type = 'button';
            closeButton.textContent = 'x';
            closeButton.setAttribute('aria-label', 'Close error banner');
            closeButton.style.cssText = [
                'width: 32px',
                'height: 32px',
                'border: 1px solid rgba(255,255,255,0.65)',
                'border-radius: 6px',
                'background: rgba(255,255,255,0.14)',
                'color: white',
                'font-size: 18px',
                'font-weight: 900',
                'line-height: 1',
                'cursor: pointer'
            ].join(';');
            closeButton.addEventListener('click', function() {
                errDiv.remove();
            });

            content.appendChild(heading);
            content.appendChild(body);
            errDiv.appendChild(content);
            errDiv.appendChild(closeButton);
            (document.body || document.documentElement).appendChild(errDiv);
        }

        window.onerror = function (msg, url, line, col, error) {
            showDismissibleErrorBanner(
                'JS ERROR:',
                String(msg || '') + '\nLocation: ' + String(url || '') + ':' + line + ':' + col + '\nStack: ' + (error && error.stack ? error.stack : 'N/A'),
                '#b91c1c'
            );
            return false;
        };
        window.addEventListener('unhandledrejection', function (event) {
            var reason = event && event.reason ? event.reason : 'Unknown promise rejection';
            showDismissibleErrorBanner(
                'PROMISE REJECTION:',
                String(reason) + '\nStack: ' + (reason && reason.stack ? reason.stack : 'N/A'),
                '#7f1d1d'
            );
        });
    </script>
</head>

<body>
    <div id="app">
        <!-- Layout Scaffolding -->
        <aside id="sidebar" class="sidebar hidden">
            <!-- Sidebar content injected by layoutView -->
        </aside>

        <main id="main-content" class="main-content">
            <header id="top-bar" class="top-bar hidden">
                <!-- Header content injected by layoutView -->
            </header>

            <div id="page-container" class="page-container">
                <!-- Page views injected here -->
                <div class="loading-screen">
<div class="skeleton-card"></div>
                    <div class="skeleton-text"></div>
                </div>
            </div>
        </main>

        <div id="modal-container"></div>
        <div id="toast-container"></div>
    </div>
    <!-- External Dependencies: Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Application Logic -->
    <script type="module" src="./js/main.js?v=2.27"></script>
</body>

</html>
