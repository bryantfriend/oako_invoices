<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OAKO Offline</title>
    <style>
        body {
            font-family: Inter, Arial, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f7fafc;
            color: #1e3318;
        }

        main {
            max-width: 520px;
            padding: 32px;
        }

        h1 {
            font-size: 24px;
            margin: 0 0 12px;
        }

        p {
            color: #5a7052;
            line-height: 1.5;
        }
    </style>
</head>

<body>
    <main>
        <h1>OAKO is offline</h1>
        <p>The application shell has not been loaded on this device yet. Reconnect once to prepare OAKO for offline startup.</p>
    </main>
</body>

</html>
